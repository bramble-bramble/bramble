kind = "web"
previewPath = "/"
title = "$BRAMBLE — Sunlit Meadow Coin"
version = "1.0.0"
id = "artifacts/bramble"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23618

[services.development]
run = "pnpm --filter @workspace/bramble run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/bramble", "run", "build" ]
publicDir = "artifacts/bramble/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23618"
BASE_PATH = "/"
